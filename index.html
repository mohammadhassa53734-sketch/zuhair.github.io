<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মোহাম্মদ জুহাইর | পোর্টফোলিও ও গ্যালারি</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            line-height: 1.6;
            padding: 20px 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            font-weight: bold;
            margin: 0 auto 15px auto;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        h1 { font-size: 26px; color: #ffffff; margin-bottom: 5px; }
        .tagline { color: #38bdf8; font-size: 15px; font-weight: 500; margin-bottom: 15px; }
        
        .section-title {
            font-size: 18px;
            color: #38bdf8;
            border-bottom: 2px solid rgba(56, 189, 248, 0.3);
            padding-bottom: 5px;
            margin: 25px 0 15px 0;
            text-align: left;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .content-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 18px;
            text-align: left;
        }

        .content-card h3 { font-size: 16px; color: #f1f5f9; margin-bottom: 12px; }
        
        /* সরাসরি ছবি প্রদর্শনের স্টাইল */
        .website-image {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 5px;
        }

        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
            padding-top: 15px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- প্রোফাইল অংশ -->
        .
        <div class="profile-header">
            <div class="avatar">জেড</div>
            <h1>মোহাম্মদ জুহাইর</h1>
            <div class="tagline">রিসার্চার | কন্টেন্ট ক্রিয়েটর</div>
            <p style="font-size: 14px; color: #94a3b8;">আমার ব্যক্তিগত পোর্টফোলিও ও ছবি গ্যালারি।</p>
        </div>

        <!-- 📸 ছবি গ্যালারি সেকশন -->
        <div class="section-title">📸 ছবি গ্যালারি</div>
        <div class="card-grid">
            
            <!-- ছবি ১ -->
            <div class="content-card">
                <h3>ছবির শিরোনাম ১</h3>
                <!-- নিচের src="" এর ভেতরে আপনার ছবির ডাইরেক্ট লিংক বসাবেন -->
                <img src="https://drive.google.com/file/d/19jrAturPsyGjEu1Ba0st7wfbABP0WIgc/view?usp=drivesdk">
            </div>

            <!-- ছবি ২ -->
            <div class="content-card">
                <h3>ছবির শিরোনাম ২</h3>
                <img src="https://drive.google.com/file/d/1NVprCK3lrzVjKKpViT3kkd5aX_Bqlhsn/view?usp=drivesdk">
            </div>

        </div>

        <!-- ফুটার -->
        <div class="footer">
            &copy; ২০২৬ মোহাম্মদ জুহাইর | সর্বস্বত্ব সংরক্ষিত
        </div>
    </div>

</body>
</html>
