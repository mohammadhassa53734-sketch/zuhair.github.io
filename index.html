<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale1.0">
    <title>জুহাইর - পারসোনাল পোর্টফোলিও</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
        .card-container { background: #fff; padding: 40px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 600px; width: 100%; }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 32px; }
        p { color: #7f8c8d; font-size: 18px; margin-bottom: 20px; }
        .badge { background: #3498db; color: #fff; padding: 8px 15px; border-radius: 20px; display: inline-block; font-size: 14px; margin-bottom: 20px; }
        .footer-text { margin-top: 30px; font-size: 14px; color: #95a5a6; border-top: 1px solid #ecf0f1; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="card-container">
        <h1>আসসালামু আলাইকুম, আমি জুহাইর</h1>
        <div class="badge">ওয়েবসাইট নির্মাণাধীন</div>
        <p>আমার পারসোনাল পোর্টফোলিও এবং রিসার্চ ওয়েবসাইটটি খুব শীঘ্রই আসছে। এখানে আমার বিভিন্ন গবেষণা, ছবি ও ভিডিও দেখতে পাবেন।</p>
        
        <div class="footer-text">
            &copy; ২০২৬ জুহাইর | সর্বস্বত্ব সংরক্ষিত
        </div>
    </div>

</body>
</html>
